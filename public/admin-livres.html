<body class="admin-body">

        <div class="admin-brand">Admin ISGA</div>
        <nav class="admin-nav">
            <a href="admin-dashboard.html" class="nav-item">📊 Tableau de bord</a>

   <main class="admin-main">
        
        <div class="admin-header">
            <h1>Gestion des Livres</h1>
            <button class="btn-primary" onclick="openModal('addBookModal')">+ Ajouter un livre</button>
        </div>

        <div class="admin-card" style="padding-top: 20px;">
            
            <div class="admin-toolbar" style="display: flex; gap: 15px; margin-bottom: 20px; padding: 0 20px; align-items: center; flex-wrap: wrap;">
                <input type="text" id="searchBookInput" placeholder="🔍 Rechercher par titre, auteur, ISBN..." style="flex-grow: 1; padding: 10px 15px; border-radius: 6px; border: 1px solid #cbd5e1; font-family: inherit; font-size: 0.95rem; outline: none; min-width: 250px;">
                
                <select id="filterCategoryInput" style="padding: 10px 15px; border-radius: 6px; border: 1px solid #cbd5e1; font-family: inherit; font-size: 0.95rem; outline: none; background: white; min-width: 200px;">
                    <option value="">Toutes les catégories</option>
                    <option value="1">Informatique</option>
                    <option value="2">Roman</option>
                    <option value="3">Sciences</option>
                    <option value="4">Histoire</option>
                    <option value="5">Philosophie</option>
                </select>
            </div>

            <div style="overflow-x: auto;">
                <table class="admin-table" style="width: 100%; min-width: 800px; text-align: left;">
                    <thead>
                        <tr>
                            <th style="padding: 15px 20px; border-bottom: 2px solid #f1f5f9;">Couverture</th>
                            <th onclick="trierTableau('title')" style="cursor: pointer; user-select: none; padding: 15px 20px; border-bottom: 2px solid #f1f5f9;" title="Trier par Titre">Titre & Auteur ↕️</th>
                            <th onclick="trierTableau('category')" style="cursor: pointer; user-select: none; padding: 15px 20px; border-bottom: 2px solid #f1f5f9;" title="Trier par Catégorie">Catégorie ↕️</th>
                            <th onclick="trierTableau('language')" style="cursor: pointer; padding: 15px 20px; border-bottom: 2px solid #f1f5f9;">Langue ↕️</th>
                            <th onclick="trierTableau('stock')" style="cursor: pointer; user-select: none; padding: 15px 20px; border-bottom: 2px solid #f1f5f9;" title="Trier par Stock">Stock ↕️</th>
                            <th style="padding: 15px 20px; border-bottom: 2px solid #f1f5f9;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="books-table-body">
                        </tbody>
                </table>
            </div>
            
            <div id="admin-pagination" style="display: flex; justify-content: center; gap: 8px; padding: 20px; border-top: 1px solid #f1f5f9;">
                </div>
            
        </div>
    </main>

    <div id="addBookModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Ajouter un nouveau livre</h2>
                <button class="btn-close" onclick="closeModal('addBookModal')">&times;</button>
            </div>
            
            <form id="addBookForm" action="api/add_book.php" method="POST" enctype="multipart/form-data" class="admin-form">
                <input type="hidden" id="existing_image_url">

                <div class="form-grid">
                    <div class="form-group">
                        <label>Titre du livre *</label>
                        <input type="text" id="title" name="title" required placeholder="Ex: Clean Code">
                    </div>
                    
                    <div class="form-group">
                        <label>Auteur *</label>
                        <input type="text" id="author" name="author" required placeholder="Ex: Robert C. Martin">
                    </div>

                        <div class="form-group">
                        <label>Catégorie *</label>
                        <select id="category" name="category" required onchange="gererNouvelleCategorie()">
                            <option value="">Sélectionner une catégorie</option>
                            <option value="1">Informatique</option>
                            <option value="2">Roman</option>
                            <option value="3">Sciences</option>
                            <option value="4">Histoire</option>
                            <option value="5">Philosophie</option>
                            <option value="NEW" style="font-weight: bold; color: royalblue;">➕ Ajouter une nouvelle catégorie...</option>
                        </select>
                        
                        <input type="text" id="newCategoryName" placeholder="Nom de la nouvelle catégorie" style="display: none; margin-top: 10px; border: 1px dashed royalblue; background-color: #f8fafc;">
                    </div>

                    <div class="form-group">
                        <label>Langue *</label>
                        <select id="language" name="language" required onchange="gererNouvelleLangue()">
                            <option value="">Sélectionner une langue</option>
                            <option value="1">Français</option>
                            <option value="2">Anglais</option>
                            <option value="3">Arabe</option>
                            <option value="NEW" style="font-weight: bold; color: #10b981;">➕ Ajouter une nouvelle langue...</option>
                        </select>
                        <input type="text" id="newLanguageName" placeholder="Ex: Espagnol" style="display: none; margin-top: 10px; border: 1px dashed #10b981; background-color: #f0fdf4;">
                    </div>

                    <div class="form-group">
                        <label>ISBN</label>
                        <input type="text" id="isbn" name="isbn" placeholder="Ex: 978-2-1234-5678-9">
                    </div>

                    <div class="form-group">
                        <label>Nombre d'exemplaires *</label>
                        <input type="number" id="quantity" name="quantity" min="1" required value="1">
                    </div>
                </div>

                <div class="form-group" style="margin-top: 20px;">
                    <label>Résumé / Description</label>
                    <textarea id="synopsis" name="synopsis" rows="4" placeholder="Résumé du livre..."></textarea>
                </div>

                <div class="form-group">
                    <label>Couverture du livre (Upload) *</label>
                    <div class="file-upload-wrapper">
                        <input type="file" id="coverImage" name="cover_image" accept="image/png, image/jpeg, image/webp" onchange="previewImage(event)">
                        
                        <div class="file-upload-preview" id="imagePreview">
                            <span>Aucune image sélectionnée</span>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal('addBookModal')">Annuler</button>
                    <button type="submit" id="submitBtn" class="btn-primary">Enregistrer le livre</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>

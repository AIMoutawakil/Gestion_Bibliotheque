<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails du livre - Bibliothèque ISGA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css"> 
    <link rel="stylesheet" href="css/details.css"> 
</head>
<body>

    <nav class="navbar glass-effect">
        <div class="nav-container" style="display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-wrap: wrap; gap: 20px; width: 100%;">
            <a class="nav-brand" href="index.html" style="white-space: nowrap;">📚 Bibliothèque ISGA</a>
            <div class="nav-links" style="display: flex; gap: 20px; align-items: center; flex-wrap: wrap;">
                <a href="index.html">Accueil</a>
                <a href="catalogue.html" class="active">Catalogue</a>
                <a href="mes-emprunts.html">Mes Emprunts</a>
                <a href="a-propos.html">À propos</a>
                <a href="aide.html">Aide</a>
            </div>
            <div class="auth-zone" id="auth-zone" style="margin-left: auto; flex-shrink: 0; padding-left: 20px;">
                <div style="display: inline-flex; align-items: center; gap: 15px;">
                    <a href="login.html" style="color: #1e293b; font-weight: 600; text-decoration: none;">Connexion</a>
                    <a href="register.html" style="background: royalblue; color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: 600;">S'inscrire</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container details-page-container">
        <div class="breadcrumb">
            <a href="catalogue.html">Catalogue</a> > 
            <span id="bread-category">...</span> > 
            <strong id="bread-title" class="bread-active">...</strong>
        </div>

        <div class="details-grid">
            <div class="details-left">
                <img id="book-cover" src="https://placehold.co/400x600/eeeeee/31343C?text=Chargement..." alt="Couverture">
                <div id="book-tags" class="tags-container"></div>
            </div>

            <div class="details-right">
                <h1 id="book-title" class="book-title">Chargement des détails...</h1>
                <p id="book-author" class="book-author">Veuillez patienter</p>
                
                <div class="meta-tags">
                    <span class="meta-tag" id="tag-year">📅 <span id="meta-year"></span></span>
                    <span class="meta-tag" id="tag-pages">📄 <span id="meta-pages"></span> pages</span>
                    <span class="meta-tag" id="tag-lang">🌍 <span id="meta-lang"></span></span>
                    <span class="meta-tag" id="tag-isbn">🔢 ISBN: <span id="meta-isbn"></span></span>
                </div>
                
                <h3 class="synopsis-title" id="title-synopsis" style="margin-bottom: 15px; color: #1e293b;">Résumé</h3>
                <p id="book-synopsis" class="book-synopsis"></p>

                <div class="action-card">
                    <div id="book-status" class="details-status">Recherche du stock...</div>
                    <div id="action-controls" class="action-controls"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/details.js"></script>
</body>
</html>

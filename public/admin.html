<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css"> <!-- Le fichier CSS spécifique à l'admin -->
</head>
<body class="admin-body">

    <!-- 1. LA SIDEBAR ENRICHIE -->
    <aside class="admin-sidebar">
        <div class="admin-brand">Admin ISGA</div>
        <nav class="admin-nav">
            <a href="admin.html" class="nav-item">📊 Tableau de bord</a>
            <a href="admin-livres.html" class="nav-item active">📚 Gestion des Livres</a>
            <a href="admin-emprunts.html" class="nav-item">🔄 Gestion des Emprunts</a>
            <a href="admin-etudiants.html" class="nav-item">🎓 Gestion des Étudiants</a>
            
            <div class="nav-divider"></div>
            
            <a href="catalogue.html" class="nav-item" target="_blank">🌐 Voir le catalogue</a>
            <a href="logout.php" class="nav-item text-danger">🚪 Déconnexion</a>
        </nav>
    </aside>

    <!-- 2. LE CONTENU PRINCIPAL -->
    <main class="admin-main">
        
        <!-- L'En-tête -->
        <div class="admin-header">
            <h1>Gestion des Livres</h1>
            <button class="btn-primary" onclick="openModal('addBookModal')">+ Ajouter un livre</button>
        </div>

        <!-- Barre d'outils (Recherche et Filtre) -->
        <div class="admin-toolbar" style="display: flex; gap: 15px; margin-bottom: 20px; align-items: center; flex-wrap: wrap;">
            <input type="text" id="searchBookInput" placeholder="🔍 Rechercher par titre, auteur, ISBN..." style="flex-grow: 1; padding: 12px 15px; border-radius: 8px; border: 1px solid #cbd5e1; font-family: inherit; font-size: 0.95rem; outline: none; min-width: 250px;">
            
            <select id="filterCategoryInput" style="padding: 12px 15px; border-radius: 8px; border: 1px solid #cbd5e1; font-family: inherit; font-size: 0.95rem; outline: none; background: white; min-width: 200px;">
                <option value="">Toutes les catégories</option>
                <option value="1">Informatique</option>
                <option value="2">Roman</option>
                <option value="3">Sciences</option>
                <option value="4">Histoire</option>
                <option value="5">Philosophie</option>
            </select>
        </div>

        <!-- Le Tableau d'inventaire -->
        <div class="admin-card" style="overflow-x: auto;">
            <table class="admin-table" style="width: 100%; min-width: 800px; text-align: left;">
                <thead>
                    <tr>
                        <th style="padding: 15px 20px;">Couverture</th>
                        <th onclick="trierTableau('title')" style="cursor: pointer; user-select: none; padding: 15px 20px;" title="Trier par Titre">Titre & Auteur ↕️</th>
                        <th onclick="trierTableau('category')" style="cursor: pointer; user-select: none; padding: 15px 20px;" title="Trier par Catégorie">Catégorie ↕️</th>
                        <th onclick="trierTableau('language')" style="cursor: pointer; padding: 15px 20px;">Langue ↕️</th>
                        <th onclick="trierTableau('stock')" style="cursor: pointer; user-select: none; padding: 15px 20px;" title="Trier par Stock">Stock ↕️</th>
                        <th style="padding: 15px 20px;">Actions</th>
                    </tr>
                </thead>
                <tbody id="books-table-body">
                    <!-- Les livres seront injectés ici par le JavaScript -->
                </tbody>
            </table>
            
            <!-- Zone de Pagination -->
            <div id="admin-pagination" style="display: flex; justify-content: center; gap: 8px; padding: 20px; border-top: 1px solid #f1f5f9;">
                <!-- Les boutons de page seront injectés ici par le JS -->
            </div>
        </div>

    </main>

    <!-- 3. LA FENÊTRE MODALE (Formulaire d'ajout) -->
    <div id="addBookModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Ajouter un nouveau livre</h2>
                <button class="btn-close" onclick="closeModal('addBookModal')">&times;</button>
            </div>
            
            <form id="addBookForm" action="api/add_book.php" method="POST" enctype="multipart/form-data" class="admin-form">
                <input type="hidden" id="existing_image_url">

                <div class="form-grid">
                    <div class="form-group">
                        <label>Titre du livre *</label>
                        <input type="text" id="title" name="title" required placeholder="Ex: Clean Code">
                    </div>
                    
                    <div class="form-group">
                        <label>Auteur *</label>
                        <input type="text" id="author" name="author" required placeholder="Ex: Robert C. Martin">
                    </div>

                        <div class="form-group">
                        <label>Catégorie *</label>
                        <!-- On ajoute l'événement onchange ici -->
                        <select id="category" name="category" required onchange="gererNouvelleCategorie()">
                            <option value="">Sélectionner une catégorie</option>
                            <option value="1">Informatique</option>
                            <option value="2">Roman</option>
                            <option value="3">Sciences</option>
                            <option value="4">Histoire</option>
                            <option value="5">Philosophie</option>
                            <!-- L'option magique pour ajouter une catégorie -->
                            <option value="NEW" style="font-weight: bold; color: royalblue;">➕ Ajouter une nouvelle catégorie...</option>
                        </select>
                        
                        <!-- Le champ texte caché qui apparaît si on choisit "NEW" -->
                        <input type="text" id="newCategoryName" placeholder="Nom de la nouvelle catégorie" style="display: none; margin-top: 10px; border: 1px dashed royalblue; background-color: #f8fafc;">
                    </div>

                    <div class="form-group">
                        <label>Langue *</label>
                        <select id="language" name="language" required onchange="gererNouvelleLangue()">
                            <option value="">Sélectionner une langue</option>
                            <option value="1">Français</option>
                            <option value="2">Anglais</option>
                            <option value="3">Arabe</option>
                            <option value="NEW" style="font-weight: bold; color: #10b981;">➕ Ajouter une nouvelle langue...</option>
                        </select>
                        <input type="text" id="newLanguageName" placeholder="Ex: Espagnol" style="display: none; margin-top: 10px; border: 1px dashed #10b981; background-color: #f0fdf4;">
                    </div>

                    <div class="form-group">
                        <label>ISBN</label>
                        <input type="text" id="isbn" name="isbn" placeholder="Ex: 978-2-1234-5678-9">
                    </div>

                    <div class="form-group">
                        <label>Nombre d'exemplaires *</label>
                        <input type="number" id="quantity" name="quantity" min="1" required value="1">
                    </div>
                </div>

                <div class="form-group" style="margin-top: 20px;">
                    <label>Résumé / Description</label>
                    <textarea id="synopsis" name="synopsis" rows="4" placeholder="Résumé du livre..."></textarea>
                </div>

                <!-- ZONE D'UPLOAD D'IMAGE -->

                <div class="form-group">
                    <label>Couverture du livre (Upload) *</label>
                    <div class="file-upload-wrapper">
                        <!-- Assure-toi d'avoir id="coverImage" ici -->
                        <input type="file" id="coverImage" name="cover_image" accept="image/png, image/jpeg, image/webp" onchange="previewImage(event)">
                        
                        <!-- 🚨 C'EST ICI QUE ÇA BLOQUAIT ! Vérifie que tu as bien id="imagePreview" 🚨 -->
                        <div class="file-upload-preview" id="imagePreview">
                            <span>Aucune image sélectionnée</span>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal('addBookModal')">Annuler</button>
                    <!-- On a ajouté l'id="submitBtn" pour changer le texte dynamiquement -->
                    <button type="submit" id="submitBtn" class="btn-primary">Enregistrer le livre</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Bibliothèque ISGA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body style="background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('images/background_login.png') no-repeat center center;">

    <div class="login-wrapper">
        <div class="logo-container">
            <img src="images/logo.png" alt="Logo Bibliothèque" class="logo-image">
        </div>

        <form class="form" id="login-form">
            <p class="title">Connexion</p>
            <p class="message">Connectez-vous pour accéder à vos emprunts.</p>
            
            <label>
                <input required="" placeholder="" type="email" class="input" id="email">
                <span>Adresse Email</span>
            </label>
            
            <label>
                <input required="" placeholder="" type="password" class="input" id="password">
                <span>Mot de passe</span>
            </label>
            
            <div id="login-error" class="error-box d-none"></div>
            
            <button class="submit" type="submit">Se connecter</button>
            
            <p class="signin">Vous n'avez pas de compte ? <a href="register.html">S'inscrire</a></p>
        </form>

        <a href="catalogue.html" class="back-link">← Retour au catalogue</a>
    </div>

    <script src="js/login.js?v=2"></script>
</body>
</html>
